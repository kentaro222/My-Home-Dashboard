<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home Dashboard</title>
    <style>
        /* 完全な黒（ダーク）テーマに修正 */
        body {
            margin: 0; padding: 0;
            background: #121212;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 800px; }

        /* 天気：シンプルで目立ちすぎないグレーに */
        .weather-box {
            font-size: 16px; margin-bottom: 20px; color: #888;
            letter-spacing: 1px; height: 24px;
        }

        /* 日付：英語でスタイリッシュに */
        #date {
            font-size: 18px; font-weight: 300; color: #aaa;
            margin-bottom: 5px; letter-spacing: 2px;
            text-transform: uppercase;
        }

        #clock {
            font-size: 80px; font-weight: 200; margin-bottom: 30px;
            letter-spacing: 5px; line-height: 1; color: #ffffff;
        }

        .search-box { margin-bottom: 40px; }
        .search-box input {
            width: 100%; padding: 15px 25px; border-radius: 50px; border: none;
            font-size: 16px; background: #222; color: white;
            outline: none; box-sizing: border-box; transition: 0.3s;
        }
        .search-box input:focus { background: #333; }

        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px; margin-bottom: 40px;
        }
        .link-item {
            padding: 15px; background: #222; color: #ccc;
            text-decoration: none; border-radius: 12px; transition: 0.3s; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        .link-item:hover {
            background: #333; color: white;
            transform: translateY(-3px);
        }

        .memo-area { background: #222; padding: 20px; border-radius: 15px; text-align: left; }
        .memo-area h3 { margin-top: 0; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        #memo { width: 100%; height: 80px; background: transparent; border: none; color: #ddd; font-size: 14px; resize: none; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="weather" class="weather-box">Loading weather...</div>
    
    <div id="date"></div>
    <div id="clock">00:00</div>

    <div class="search-box">
        <form action="https://www.google.com/search" method="get">
            <input type="text" name="q" placeholder="Google Search..." autofocus autocomplete="off">
        </form>
    </div>

    <div class="links">
        <a href="https://gemini.google.com/" class="link-item">Gemini</a>
        <a href="https://keep.google.com/" class="link-item">Keep</a>
        <a href="https://drive.google.com/" class="link-item">Drive</a>
        <a href="https://youtube.com/" class="link-item">YouTube</a>
        <a href="https://github.com/" class="link-item">GitHub</a>
        <a href="https://translate.google.com/" class="link-item">翻訳</a>
        <a href="https://kentaro222.github.io/Bar-Timer/" class="link-item">Bar-Timer</a>
        <a href="https://kentaro222.github.io/Stage-Tools/" class="link-item">Stage-Tools</a>
        <a href="https://kentaro222.github.io/QR-Code-Generation-and-Saver/" class="link-item">QR-Code</a>
    </div>

    <div class="memo-area">
        <h3>Quick Memo</h3>
        <textarea id="memo" placeholder="Type here..."></textarea>
    </div>
</div>

<script>
    // --- 時計と日付 ---
    function updateTime() {
        const now = new Date();
        
        // 英語フォーマットの日付（例: FRIDAY, MARCH 13）
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);

        // 時計
        document.getElementById('clock').textContent = 
            `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    }
    setInterval(updateTime, 1000);
    updateTime();

    // --- 天気 (安定したOpen-Meteo APIを使用 / 渋谷周辺の座標) ---
    async function fetchWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6598&longitude=139.7024&current_weather=true');
            if (!res.ok) throw new Error("Network error");
            const data = await res.json();
            
            const temp = Math.round(data.current_weather.temperature);
            const code = data.current_weather.weathercode;
            
            // 天気コードをアイコンに変換
            let icon = "🌤️";
            if (code === 0) icon = "☀️"; // 晴れ
            else if (code <= 3) icon = "⛅"; // 曇り
            else if (code <= 48) icon = "🌫️"; // 霧
            else if (code <= 67) icon = "🌧️"; // 雨
            else if (code <= 77) icon = "❄️"; // 雪
            else if (code >= 80) icon = "☔"; // 強い雨・雷雨

            document.getElementById('weather').textContent = `Tokyo ${icon} ${temp}°C`;
        } catch (e) {
            document.getElementById('weather').textContent = "Weather unavailable";
        }
    }
    fetchWeather();
    setInterval(fetchWeather, 3600000); // 1時間ごとに更新

    // --- メモ ---
    const memo = document.getElementById('memo');
    memo.value = localStorage.getItem('my_dashboard_memo') || "";
    memo.addEventListener('input', () => {
        localStorage.setItem('my_dashboard_memo', memo.value);
    });
</script>

</body>
</html>
