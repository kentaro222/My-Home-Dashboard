<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home Dashboard</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: white; font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 800px; }

        .weather-box {
            font-size: 18px; margin-bottom: 15px; color: #00d4ff;
            height: 30px;
        }

        /* 日付用のスタイルを追加 */
        #date {
            font-size: 24px; font-weight: 300; color: #ccc;
            margin-bottom: 5px; letter-spacing: 2px;
        }

        /* 時計の上の余白を少し調整 */
        #clock { font-size: 80px; font-weight: 200; margin-bottom: 30px; letter-spacing: 5px; line-height: 1; }

        .search-box { margin-bottom: 40px; }
        .search-box input {
            width: 100%; padding: 15px 25px; border-radius: 50px; border: none;
            font-size: 18px; background: rgba(255, 255, 255, 0.1); color: white;
            outline: none; backdrop-filter: blur(5px); box-sizing: border-box;
            transition: 0.3s;
        }
        .search-box input:focus { background: rgba(255, 255, 255, 0.2); }

        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        .link-item {
            padding: 15px; background: rgba(255, 255, 255, 0.05); color: #ddd;
            text-decoration: none; border-radius: 12px; transition: 0.3s; font-size: 14px;
        }
        .link-item:hover {
            background: rgba(255, 255, 255, 0.15); color: white;
            transform: translateY(-3px);
        }

        .memo-area { background: rgba(0, 0, 0, 0.2); padding: 20px; border-radius: 15px; text-align: left; }
        .memo-area h3 { margin-top: 0; font-size: 12px; color: #aaa; text-transform: uppercase; }
        #memo { width: 100%; height: 80px; background: transparent; border: none; color: white; font-size: 16px; resize: none; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="weather" class="weather-box">Loading weather...</div>
    
    <div id="date"></div>
    <div id="clock">00:00</div>

    <div class="search-box">
        <form action="https://www.google.com/search" method="get">
            <input type="text" name="q" placeholder="Google Search..." autofocus autocomplete="off">
        </form>
    </div>

    <div class="links">
        <a href="https://gemini.google.com/" class="link-item">Gemini</a>
        <a href="https://keep.google.com/" class="link-item">Keep</a>
        <a href="https://drive.google.com/" class="link-item">Drive</a>
        <a href="https://youtube.com/" class="link-item">YouTube</a>
        <a href="https://github.com/" class="link-item">GitHub</a>
         <a href="https://translate.google.com/" class="link-item">翻訳</a>
        <a href="https://kentaro222.github.io/Bar-Timer/" class="link-item">Bar-Timer</a>
        <a href="https://kentaro222.github.io/Stage-Tools/" class="link-item">Stage-Tools</a>
        <a href="https://kentaro222.github.io/QR-Code-Generation-and-Saver/" class="link-item">QR-Code</a>
    </div>

    <div class="memo-area">
        <h3>Quick Memo</h3>
        <textarea id="memo" placeholder="Type here..."></textarea>
    </div>
</div>

<script>
    const CITY = "Tokyo"; // お好みの都市名

    // 日付と時計を更新する機能
    function updateTime() {
        const now = new Date();
        
        // 日付の処理 (例: 2024年4月1日(月))
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        const dayStr = days[now.getDay()];
        document.getElementById('date').textContent = `${year}年${month}月${date}日(${dayStr})`;

        // 時計の処理
        document.getElementById('clock').textContent = 
            `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    }
    
    // 1秒ごとに更新（日付も日またぎで自動更新されます）
    setInterval(updateTime, 1000);
    updateTime();

    // 天気の取得
    async function fetchWeather() {
        try {
            const response = await fetch(`https://wttr.in/${CITY}?format=3&lang=ja`);
            if (response.ok) {
                const data = await response.text();
                document.getElementById('weather').textContent = data;
            }
        } catch (e) {
            document.getElementById('weather').textContent = "Weather Error";
        }
    }
    fetchWeather();
    setInterval(fetchWeather, 3600000);

    // メモの保存
    const memo = document.getElementById('memo');
    memo.value = localStorage.getItem('my_dashboard_memo') || "";
    memo.addEventListener('input', () => {
        localStorage.setItem('my_dashboard_memo', memo.value);
    });
</script>

</body>
</html>
