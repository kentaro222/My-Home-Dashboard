<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home Dashboard</title>
    <style>
        /* 全体的に黒っぽいダークテーマに変更 */
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #050505, #1a1a1a);
            color: white; font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 800px; }

        /* 天気：落ち着いたグレーに変更 */
        .weather-box {
            font-size: 18px; margin-bottom: 10px; color: #b3b3b3;
            height: 30px;
        }

        #clock { font-size: 80px; font-weight: 200; margin-bottom: 20px; letter-spacing: 5px; }

        .search-box { margin-bottom: 40px; }
        .search-box input {
            width: 100%; padding: 15px 25px; border-radius: 50px; border: none;
            font-size: 18px; background: rgba(255, 255, 255, 0.08); color: white;
            outline: none; backdrop-filter: blur(5px); box-sizing: border-box;
            transition: 0.3s;
        }
        .search-box input:focus { background: rgba(255, 255, 255, 0.15); }

        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        .link-item {
            padding: 15px; background: rgba(255, 255, 255, 0.05); color: #ddd;
            text-decoration: none; border-radius: 12px; transition: 0.3s; font-size: 14px;
        }
        .link-item:hover {
            background: rgba(255, 255, 255, 0.15); color: white;
            transform: translateY(-3px);
        }

        .memo-area { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; text-align: left; }
        .memo-area h3 { margin-top: 0; font-size: 12px; color: #888; text-transform: uppercase; }
        #memo { width: 100%; height: 80px; background: transparent; border: none; color: white; font-size: 16px; resize: none; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="weather" class="weather-box">Loading weather...</div>
    <div id="clock">00:00</div>

    <div class="search-box">
        <form action="https://www.google.com/search" method="get">
            <input type="text" name="q" placeholder="Google Search..." autofocus autocomplete="off">
        </form>
    </div>

    <div class="links">
        <a href="https://gemini.google.com/" class="link-item">Gemini</a>
        <a href="https://keep.google.com/" class="link-item">Keep</a>
        <a href="https://drive.google.com/" class="link-item">Drive</a>
        <a href="https://youtube.com/" class="link-item">YouTube</a>
        <a href="https://github.com/" class="link-item">GitHub</a>
         <a href="https://translate.google.com/" class="link-item">翻訳</a>
        <a href="https://kentaro222.github.io/Bar-Timer/" class="link-item">Bar-Timer</a>
        <a href="https://kentaro222.github.io/Stage-Tools/" class="link-item">Stage-Tools</a>
        <a href="https://kentaro222.github.io/QR-Code-Generation-and-Saver/" class="link-item">QR-Code</a>
    </div>

    <div class="memo-area">
        <h3>Quick Memo</h3>
        <textarea id="memo" placeholder="Type here..."></textarea>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = 
            `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 安定性の高いOpen-Meteo APIを使用（東京の緯度・経度を設定しています）
    async function fetchWeather() {
        try {
            // 東京: latitude=35.6895, longitude=139.6917
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current_weather=true&timezone=Asia%2FTokyo');
            
            if (response.ok) {
                const data = await response.json();
                const temp = data.current_weather.temperature;
                const code = data.current_weather.weathercode;
                
                // 天気コードを絵文字に変換
                const weatherEmoji = {
                    0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️",
                    45: "🌫️", 48: "🌫️",
                    51: "🌧️", 53: "🌧️", 55: "🌧️", 56: "🌧️", 57: "🌧️",
                    61: "☔", 63: "☔", 65: "☔", 66: "☔", 67: "☔",
                    71: "❄️", 73: "❄️", 75: "❄️", 77: "❄️",
                    80: "🌧️", 81: "🌧️", 82: "🌧️",
                    85: "❄️", 86: "❄️",
                    95: "⚡", 96: "⚡", 99: "⚡"
                };
                
                const emoji = weatherEmoji[code] || "❓";
                document.getElementById('weather').textContent = `Tokyo: ${emoji} ${temp}°C`;
            } else {
                document.getElementById('weather').textContent = "Weather Error";
            }
        } catch (e) {
            document.getElementById('weather').textContent = "Weather Error";
        }
    }
    fetchWeather();
    setInterval(fetchWeather, 3600000); // 1時間ごとに更新

    const memo = document.getElementById('memo');
    memo.value = localStorage.getItem('my_dashboard_memo') || "";
    memo.addEventListener('input', () => {
        localStorage.setItem('my_dashboard_memo', memo.value);
    });
</script>

</body>
</html>
